<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <!-- Shield background -->
  <path d="M10,10 L190,10 L190,160 Q190,200 100,225 Q10,200 10,160 Z"
        fill="#2a2d1e" stroke="#1a1c12" stroke-width="3"/>

  <!-- Glass stem -->
  <rect x="96" y="168" width="8" height="28" rx="3" fill="#f0e8c8" stroke="#c8b87a" stroke-width="1"/>
  <!-- Glass base -->
  <ellipse cx="100" cy="196" rx="22" ry="5" fill="#f0e8c8" stroke="#c8b87a" stroke-width="1"/>

  <!-- Orange/red liquid fill -->
  <path d="M76,115 Q74,145 80,162 Q88,168 100,168 Q112,168 120,162 Q126,145 124,115 Z"
        fill="#e85520"/>
  <!-- Amber/yellow top layer -->
  <path d="M73,80 Q72,100 76,115 L124,115 Q128,100 127,80 Z"
        fill="#d4a84b"/>

  <!-- Glass outline (flute shape) -->
  <path d="M73,75 Q70,120 80,162 Q88,170 100,170 Q112,170 120,162 Q130,120 127,75"
        fill="none" stroke="#c8b87a" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Glass sides connect at top -->
  <path d="M73,75 Q85,68 100,67 Q115,68 127,75"
        fill="none" stroke="#c8b87a" stroke-width="2.5"/>

  <!-- Glass rim -->
  <ellipse cx="100" cy="75" rx="27" ry="7" fill="none" stroke="#c8b87a" stroke-width="2"/>
  <ellipse cx="100" cy="73" rx="27" ry="6" fill="#f0e8c8" opacity="0.25"/>

  <!-- Liquid surface line -->
  <path d="M76,115 Q100,110 124,115" fill="none" stroke="#c8a030" stroke-width="1.5" opacity="0.8"/>

  <!-- Bubbles — red zone -->
  <circle cx="95"  cy="155" r="3"   fill="white" opacity="0.75"/>
  <circle cx="108" cy="148" r="2.5" fill="white" opacity="0.70"/>
  <circle cx="100" cy="135" r="2"   fill="white" opacity="0.65"/>
  <circle cx="90"  cy="143" r="2"   fill="white" opacity="0.60"/>
  <circle cx="107" cy="158" r="1.5" fill="white" opacity="0.55"/>
  <!-- Bubbles — amber zone -->
  <circle cx="101" cy="106" r="2.5" fill="white" opacity="0.60"/>
  <circle cx="108" cy="94"  r="2"   fill="white" opacity="0.55"/>
  <circle cx="94"  cy="99"  r="1.5" fill="white" opacity="0.50"/>

  <!-- 4-pointed star (bottom right) -->
  <path d="M174,210 L176,216 L182,218 L176,220 L174,226 L172,220 L166,218 L172,216 Z"
        fill="#7a7f6a" opacity="0.65"/>
</svg>
