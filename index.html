<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/mimosa-app.png" />
    <link rel="apple-touch-icon" href="/mimosa-app.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      (function(){
        try {
          var diva  = localStorage.getItem('memosa-diva')  === '1';
          var light = localStorage.getItem('mimosa-light') === '1';
          var bg = diva ? '#1C0812' : light ? '#ffffff' : '#0b0b0a';
          document.querySelector('meta[name="theme-color"]').setAttribute('content', bg);
          document.documentElement.style.backgroundColor = bg;
          if (diva)  document.documentElement.classList.add('theme-diva');
          if (light) document.documentElement.classList.add('theme-light');
        } catch(e) {}
      })();
    </script>
    <meta name="apple-mobile-web-app-title" content="Mimosa" />
    <title>Mimosa 2026</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
